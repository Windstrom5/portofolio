<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <title>Sakura VN - Manga Style</title>

  <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.152.2/build/three.module.js",
          "three/examples/jsm/loaders/GLTFLoader.js": "https://unpkg.com/three@0.152.2/examples/jsm/loaders/GLTFLoader.js"
        }
      }
    </script>

  <style>
    body {
      margin: 0;
      overflow: hidden;
      background-color: transparent;
      font-family: "Segoe UI", sans-serif;
    }

    /* === VISUAL NOVEL DIALOG BOX FIX === */
    #bubble-container {
      display: none !important; /* Hidden in favor of global Flutter VN UI */
      position: absolute;
      bottom: 10px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 20;
      width: 95%;
      opacity: 0;
      transition: opacity 0.5s ease-in-out;
    }

    #speech-bubble {
      background: rgba(15, 17, 26, 0.85); /* Deep dark cyberpunk theme */
      border: 1px solid rgba(0, 229, 255, 0.5); /* Cyan accent */
      border-radius: 8px;
      padding: 15px 20px;
      color: #FFF;
      position: relative;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      font-family: "Segoe UI", "Inter", sans-serif;
      font-size: 0.95rem;
      line-height: 1.5;
      text-align: left;
      font-weight: 500;
      text-shadow: 1px 1px 2px rgba(0,0,0,0.8);

      max-height: 140px;
      overflow-y: auto;
      display: block;
    }

    /* Hide scrollbar but keep functionality */
    #speech-bubble::-webkit-scrollbar {
      width: 0px;
    }

    /* === HEART PARTICLE EFFECTS === */
    #particle-container {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 30;
      overflow: hidden;
    }
    .heart-particle {
      position: absolute;
      font-size: 1.2rem;
      animation: floatUp 1.5s ease-out forwards;
      pointer-events: none;
      opacity: 1;
    }
    @keyframes floatUp {
      0% { transform: translateY(0) scale(0.3) rotate(0deg); opacity: 1; }
      50% { opacity: 1; }
      100% { transform: translateY(-120px) scale(1.2) rotate(25deg); opacity: 0; }
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>
</head>

<body>
  <div id="loading-overlay" style="
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.7);
        display: flex;
        align-items: center;
        justify-content: center;
        color: white;
        font-size: 0.85rem;
        z-index: 9999;
        transition: opacity 0.6s;
      ">
    <div style="text-align: center">
      <div class="spinner" style="
            border: 6px solid #f3f3f3;
            border-top: 6px solid #3498db;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1.2s linear infinite;
            margin: 0 auto 20px;
          "></div>
      <div>Loading Sakura (voice engine)...</div>
      <div id="status-text" style="font-size: 0.9rem; margin-top: 12px; opacity: 0.8">
        Japanese voice may take a few seconds...
      </div>
    </div>
  </div>

  <!-- VOICE UNLOCK OVERLAY -->
  <div id="voice-unlock" style="
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.4);
        display: none;
        align-items: center;
        justify-content: center;
        color: white;
        z-index: 9998;
        cursor: pointer;
        backdrop-filter: blur(2px);
      ">
    <div style="text-align: center; background: rgba(0,0,0,0.8); padding: 20px; border-radius: 15px; border: 2px solid pink;">
      <div style="font-size: 3rem; margin-bottom: 10px;">🔊</div>
      <div style="font-weight: bold;">Tap to Enable Sakura's Voice</div>
      <div style="font-size: 0.8rem; margin-top: 10px; opacity: 0.7;">(Required by browser security)</div>
    </div>
  </div>
  <div id="bubble-container">
    <div id="speech-bubble">
      <div id="voice-status" style="position: absolute; top: 10px; right: 10px; font-size: 0.6rem; color: #ff6b9d; font-weight: bold; opacity: 0.8;"></div>
      <span id="text-display">...</span>
    </div>
  </div>
  <div id="particle-container"></div>

  <script type="module">
    import * as THREE from "three";
    import { GLTFLoader } from "three/examples/jsm/loaders/GLTFLoader.js";
    import { VRMLoaderPlugin } from "https://unpkg.com/@pixiv/three-vrm@2.0.0/lib/three-vrm.module.js";

    /* ===================== 3D SETUP ===================== */
    let scene, camera, renderer, vrm;
    let clock = new THREE.Clock();
    let isSleeping = false;
    let currentActivity = 'idle'; // 'idle', 'typing', 'pat', 'wave', 'dance'
    let specialAnimTimer = null;
    let lastFidgetTime = 0;
    let fidgetInterval = 10; // seconds between fidgets
    let currentFidgetPhase = 0;
    let fidgetType = -1;
    let voicesReady = false;
    let hasJapaneseVoice = false;
    window.speechSynthesis.onvoiceschanged = () => {
      checkVoices();
    };
    setTimeout(checkVoices, 300);
    setTimeout(checkVoices, 1200);
    scene = new THREE.Scene();
    camera = new THREE.PerspectiveCamera(
      30,
      window.innerWidth / window.innerHeight,
      0.1,
      100,
    );
    camera.position.set(0.0, 1.4, 2.8);

    renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(window.devicePixelRatio);
    document.body.appendChild(renderer.domElement);

    scene.add(new THREE.AmbientLight(0xffffff, 0.8));
    const sun = new THREE.DirectionalLight(0xffffff, 0.6);
    sun.position.set(1, 1, 1).normalize();
    scene.add(sun);

    const loader = new GLTFLoader();
    loader.register((parser) => new VRMLoaderPlugin(parser));
    loader.load("/models/Aiko.vrm", (gltf) => {
      vrm = gltf.userData.vrm;
      scene.add(vrm.scene);

      // Initial Pose
      const rb = (n, v) => {
        const b = vrm.humanoid.getNormalizedBoneNode(n);
        if (b) b.rotation.z = v;
      };
      rb("leftUpperArm", -1.3);
      rb("rightUpperArm", 1.3);
      rb("leftLowerArm", 0.3);
      rb("rightLowerArm", -0.3);

      const neck = vrm.humanoid.getNormalizedBoneNode("neck");
      if (neck) neck.rotation.x = 0; // Awake

      // === CRITICAL: Notify parent (Flutter) that VRM is ready ===
      console.log("VRM: Model loaded, sending vrm_ready to parent");
      
      // Setup LookAt - We use manual bone rotation now for better control
      // vrm.lookAt.target = lookAtTarget; 
      // vrm.lookAt.autoUpdate = true;
      
      if (window.parent && window.parent !== window) {
        window.parent.postMessage({ type: 'vrm_ready' }, '*');
      }
    });

    /* ===================== VN STYLE TEXT & VOICE ===================== */
    let typingInterval;
    let hideTimeout;
    let selectedVoice = null;

    function checkVoices() {
      const voices = window.speechSynthesis.getVoices();
      if (voices.length > 0 && !voicesReady) {
        voicesReady = true;
        const jaVoices = voices.filter((v) => v.lang.startsWith("ja"));
        hasJapaneseVoice = jaVoices.length > 0;

        console.log(
          "Voices loaded:",
          voices.length,
          "Japanese voices:",
          jaVoices.length,
        );
        console.log(
          "Available ja voices:",
          jaVoices.map((v) => `${v.name} (${v.lang})`),
        );

        // Pre-select the best voice
        selectedVoice = selectBestVoice(voices);
        console.log("Selected voice:", selectedVoice?.name || "default");

        // Hide loading when voices exist
        hideLoading();
      }
    }

    // Priority voice selection for more natural sound
    function selectBestVoice(voices) {
      const jaVoices = voices.filter((v) => v.lang === "ja-JP" || v.lang.startsWith("ja"));

      // Priority order: neural/natural voices first for best quality
      const priorityPatterns = [
        /Microsoft.*Nanami.*Online.*Natural/i, // Edge Neural (best quality)
        /Microsoft.*Nanami/i,      // Edge Neural voice (High quality female)
        /Google.*ja-JP.*Neural/i,  // Google Neural Japanese
        /Google.*日本語/i,          // Google Japanese
        /Google.*Japanese/i,       // Google Japanese alt
        /Microsoft.*Haruka/i,      // Microsoft Female
        /Neural/i,                 // Any neural voice
        /Natural/i,                // Any natural voice
        /Kyoko/i,                  // Apple Kyoko (Female)
        /O-Ren/i,                  // Apple O-Ren (Female)
        /Mei-Mei/i,                // Possible other female names
        /Airi/i,
      ];

      for (const pattern of priorityPatterns) {
        const match = jaVoices.find((v) => pattern.test(v.name));
        if (match) {
          console.log("VRM: Selected neural voice:", match.name);
          return match;
        }
      }

      // Fallback to any Japanese voice
      return jaVoices[0] || voices[0];
    }

    // Check if selected voice is neural/natural quality
    function isNeuralVoice(voice) {
      if (!voice) return false;
      return /neural|natural|nanami|online/i.test(voice.name);
    }

    function hideLoading() {
      const overlay = document.getElementById("loading-overlay");
      if (overlay) {
        overlay.style.opacity = "0";
        setTimeout(() => {
          overlay.style.display = "none";
        }, 600);
      }
    }

    // Main speak function - now accepts both Japanese (for voice) and English (for display)
    let audioUnlocked = false;
    
    // Auto-unlock audio: try immediately and on first message from parent
    function tryUnlockAudio() {
      if (audioUnlocked) return;
      try {
        const u = new SpeechSynthesisUtterance("");
        u.volume = 0;
        window.speechSynthesis.speak(u);
        audioUnlocked = true;
        console.log("VRM: Audio unlocked automatically");
      } catch(e) {
        console.warn("VRM: Auto audio unlock failed, waiting for interaction", e);
      }
    }

    // Try immediately
    tryUnlockAudio();

    // Also unlock on click (fallback for strict browsers)
    window.addEventListener('click', () => {
      tryUnlockAudio();
      document.getElementById("voice-unlock").style.display = "none";
    });
    
    document.getElementById("voice-unlock").addEventListener('click', () => {
      tryUnlockAudio();
      document.getElementById("voice-unlock").style.display = "none";
    });

    // Also unlock on first postMessage from parent (counts as user gesture in many browsers)
    window.addEventListener('message', function unlockOnMessage() {
      tryUnlockAudio();
      window.removeEventListener('message', unlockOnMessage);
    });

    let currentAudioSource = null;
    let audioContext = null;
    let analyser = null;
    let dataArray = null;
    let isVoicevoxPlaying = false;

    // Stop any currently playing audio
    function stopCurrentAudio() {
      if (currentAudioSource) {
        try { currentAudioSource.stop(); } catch(e) {}
        currentAudioSource = null;
      }
      isVoicevoxPlaying = false;
      window.speechSynthesis.cancel();
    }

    async function speakWithVoicevox(text, speakerId = 46) {
      const statusEl = document.getElementById("voice-status");
      try {
        if (statusEl) statusEl.textContent = "⌛ SYNCING...";
        
        // Use api.tts.quest v3 with AbortController timeout
        const url = `https://api.tts.quest/v3/voicevox/synthesis?text=${encodeURIComponent(text)}&speaker=${speakerId}`;
        
        const controller = new AbortController();
        const fetchTimeout = setTimeout(() => controller.abort(), 10000); // 10s hard timeout
        
        const response = await fetch(url, { signal: controller.signal });
        clearTimeout(fetchTimeout);
        
        if (response.status === 429) {
          if (statusEl) statusEl.textContent = "✦ RATE LIMITED";
          throw new Error("Voicevox: Too many requests (429)");
        }
        
        if (!response.ok) throw new Error("Voicevox API request failed");
        
        const data = await response.json();
        if (!data.success) throw new Error("Voicevox synthesis failed");

        const statusUrl = data.audioStatusUrl;
        const audioUrl = data.mp3DownloadUrl;

        // Poll for readiness (increased timeout)
        let isReady = false;
        let attempts = 0;
        const maxAttempts = 25; // ~12.5 seconds

        if (statusEl) statusEl.textContent = "✦ GENERATING...";

        while (!isReady && attempts < maxAttempts) {
          const statusRes = await fetch(statusUrl);
          const statusData = await statusRes.json();
          if (statusData.isAudioReady) {
            isReady = true;
          } else {
            attempts++;
            await new Promise(r => setTimeout(r, 500));
          }
        }

        if (!isReady) throw new Error("Voicevox timeout");
        if (statusEl) statusEl.textContent = "✦ NEURAL";
        
        stopCurrentAudio();

        // === CORS FIX: Fetch audio as ArrayBuffer, decode, play via AudioBufferSourceNode ===
        // This avoids CORS restrictions that cause MediaElementAudioSource to output zeroes
        if (!audioContext) {
          audioContext = new (window.AudioContext || window.webkitAudioContext)();
        }
        if (audioContext.state === 'suspended') {
          await audioContext.resume();
        }

        const audioResponse = await fetch(audioUrl);
        const arrayBuffer = await audioResponse.arrayBuffer();
        const audioBuffer = await audioContext.decodeAudioData(arrayBuffer);

        // Create source and analyser
        const source = audioContext.createBufferSource();
        source.buffer = audioBuffer;
        
        analyser = audioContext.createAnalyser();
        analyser.fftSize = 256;
        source.connect(analyser);
        analyser.connect(audioContext.destination);
        dataArray = new Uint8Array(analyser.frequencyBinCount);

        currentAudioSource = source;
        isVoicevoxPlaying = true;

        source.onended = () => {
          isVoicevoxPlaying = false;
          currentAudioSource = null;
          if (window.parent && window.parent !== window) {
            window.parent.postMessage({ type: 'speechEnd' }, '*');
          }
          hideTimeout = setTimeout(() => {
            document.getElementById("bubble-container").style.opacity = "0";
          }, 5000);
        };

        source.start(0);
        if (window.parent && window.parent !== window) {
          window.parent.postMessage({ type: 'speechStart' }, '*');
        }
        return true;
      } catch (e) {
        console.warn("VRM: Voicevox failed, falling back to browser TTS", e);
        if (statusEl) statusEl.textContent = isNeuralVoice(selectedVoice) ? "✦ NEURAL" : "✦ LEGACY";
        return false;
      }
    }

    async function speak(textOrData) {
      // Check mute state
      if (window.__VRM_MUTED__) {
        // Still show text but don't play audio
        let displayText = "";
        if (typeof textOrData === 'object' && textOrData !== null) {
          displayText = textOrData.english || textOrData.en || textOrData.text || "";
        } else {
          displayText = textOrData || "";
        }
        const display = document.getElementById("text-display");
        const container = document.getElementById("bubble-container");
        display.innerHTML = displayText.replace(/\*/g, "").replace(/#/g, "");
        container.style.opacity = "1";
        setTimeout(() => { container.style.opacity = "0"; }, 5000);
        return;
      }

      let japaneseText, englishText;

      if (typeof textOrData === 'object' && textOrData !== null) {
        japaneseText = textOrData.japanese || textOrData.jp || textOrData.text || "";
        englishText = textOrData.english || textOrData.en || japaneseText;
      } else {
        japaneseText = textOrData || "";
        englishText = japaneseText;
      }

      if (!japaneseText) return;

      // === FIX: Stop ALL currently playing audio FIRST to prevent stacking ===
      stopCurrentAudio(); // kills AudioBufferSource + speechSynthesis.cancel()

      const cleanJapanese = japaneseText.replace(/\*/g, "").replace(/#/g, "");
      const cleanEnglish = englishText.replace(/\*/g, "").replace(/#/g, "");

      const container = document.getElementById("bubble-container");
      const display = document.getElementById("text-display");

      if (typingInterval) clearInterval(typingInterval);
      if (hideTimeout) clearTimeout(hideTimeout);

      display.innerHTML = "";
      container.style.opacity = "1";

      // 1. Try Voicevox first (Natural)
      const voicevoxSuccess = await speakWithVoicevox(cleanJapanese);
      
      if (voicevoxSuccess) {
          // Voicevox is playing, just start typewriter
          startSyncedTypewriter(cleanEnglish, { text: cleanJapanese, rate: 1.0 });
          return;
      }

      // 2. Fallback to Browser TTS
      // Cancel again in case something started during Voicevox polling
      window.speechSynthesis.cancel();
      
      if (!voicesReady) {
        checkVoices();
        if (!voicesReady) {
          display.innerHTML = "Voice system loading... ♡<br>" + cleanEnglish;
          document.getElementById("voice-unlock").style.display = "flex";
          return;
        }
      }

      if (!audioUnlocked) {
         document.getElementById("voice-unlock").style.display = "flex";
      }

      const utter = new SpeechSynthesisUtterance(cleanJapanese);
      utter.lang = "ja-JP";
      if (selectedVoice) utter.voice = selectedVoice;
      // More natural settings: lower pitch + slower rate = less robotic
      utter.pitch = isNeuralVoice(selectedVoice) ? 1.1 : 1.15;
      utter.rate = isNeuralVoice(selectedVoice) ? 0.9 : 0.95;

      utter.onstart = () => {
        startSyncedTypewriter(cleanEnglish, utter);
        if (window.parent && window.parent !== window) {
          window.parent.postMessage({ type: 'speechStart' }, '*');
        }
      };

      utter.onend = () => {
        display.innerHTML = cleanEnglish;
        document.getElementById("speech-bubble").scrollTop = document.getElementById("speech-bubble").scrollHeight;
        if (window.parent && window.parent !== window) {
          window.parent.postMessage({ type: 'speechEnd' }, '*');
        }
        hideTimeout = setTimeout(() => {
          container.style.opacity = "0";
        }, 5000);
      };

      window.speechSynthesis.speak(utter);
    }

    // Synced typewriter that matches speech duration
    function startSyncedTypewriter(text, utterance) {
      const container = document.getElementById("bubble-container");
      const display = document.getElementById("text-display");

      if (typingInterval) clearInterval(typingInterval);

      // Estimate speech duration based on Japanese text length and rate
      // Average Japanese speech: ~7-8 characters per second
      const estimatedDuration = (utterance.text.length / 7) * 1000 / utterance.rate;
      const intervalMs = Math.max(30, estimatedDuration / text.length);

      let i = 0;
      display.innerHTML = "";

      typingInterval = setInterval(() => {
        if (i < text.length) {
          display.innerHTML += text.charAt(i);
          i++;
          document.getElementById("speech-bubble").scrollTop =
            document.getElementById("speech-bubble").scrollHeight;
        } else {
          clearInterval(typingInterval);
        }
      }, intervalMs);
    }

    // --- Message Handling ---
    const urlParams = new URLSearchParams(window.location.search);
    const myViewId = urlParams.get('viewId');
    console.log(`VRM: Instance started with viewId: ${myViewId}`);

    window.addEventListener("message", (event) => {
      const data = event.data;
      if (!data) return;

      // Filter by targetId if provided and we have our own viewId
      if (myViewId && data.targetId && data.targetId !== myViewId) {
        return; 
      }

      const type = data.type;
      
      if (type === "speak") {
        if (voicesReady) {
          // Handle bilingual format: {japanese, english} or legacy {text}
          if (data.japanese && data.english) {
            speak({
              japanese: data.japanese,
              english: data.english
            });
          } else {
            // Legacy format or fallback
            speak(data.text || data.japanese || data.english || "");
          }
        } else {
          document.getElementById("text-display").innerHTML =
            "Still loading Sakura's voice... ♡<br>" + (data.english || data.text || "");
        }
      } else if (type === "emotion") {
        // Handle emotion changes: joy, angry, sorrow, fun, lookup, lookdown, etc.
        const emotion = data.emotion;
        if (vrm && emotion) {
           // Reset common expressions
           vrm.expressionManager.setValue("joy", 0);
           vrm.expressionManager.setValue("angry", 0);
           vrm.expressionManager.setValue("sorrow", 0);
           vrm.expressionManager.setValue("fun", 0);
           
           // Set new emotion
           if (["joy", "angry", "sorrow", "fun"].includes(emotion)) {
             vrm.expressionManager.setValue(emotion, 1.0);
           }
        }
      } else if (type === "wake") {
        isSleeping = false;
        if (vrm) {
          const neck = vrm.humanoid.getNormalizedBoneNode("neck");
          if (neck) neck.rotation.x = 0;
        }
        speak({
          japanese: "あら？お客様？やっと来たのね！待ってたよ！",
          english: "H-Huh? A visitor? You're finally here! I've been waiting! ♡"
        });
       } else if (type === "pat") {
        triggerPat();
      } else if (type === "wave") {
        triggerWave();
      } else if (type === "dance") {
        triggerDance();
      } else if (type === "control") {
        // Head tracking data
        if (data.x !== undefined && data.y !== undefined) {
           targetX = data.x; // -1 to 1
           targetY = data.y; // -1 to 1
        }
      } else if (type === "activity") {
        currentActivity = data.activity || 'idle';
      } else if (type === "mute") {
        // Toggle mute state — stop current audio and prevent future speech
        window.__VRM_MUTED__ = !!data.muted;
        if (window.__VRM_MUTED__) {
          stopCurrentAudio();
        }
      }
    });

    /* ===================== PAT / WAVE / DANCE ===================== */
    function triggerPat() {
      if (specialAnimTimer) clearTimeout(specialAnimTimer);
      currentActivity = 'pat';
      spawnHearts(5);
      exprTargets.joy = 1.0;
      specialAnimTimer = setTimeout(() => {
        currentActivity = 'idle';
        exprTargets.joy = 0;
      }, 2500);
    }

    function triggerWave() {
      if (specialAnimTimer) clearTimeout(specialAnimTimer);
      currentActivity = 'wave';
      specialAnimTimer = setTimeout(() => {
        currentActivity = 'idle';
      }, 2500);
    }

    function triggerDance() {
      if (specialAnimTimer) clearTimeout(specialAnimTimer);
      currentActivity = 'dance';
      specialAnimTimer = setTimeout(() => {
        currentActivity = 'idle';
      }, 3500);
    }

    /* ===================== HEART PARTICLES ===================== */
    function spawnHearts(count) {
      const container = document.getElementById('particle-container');
      const emojis = ['💖', '✨', '💕', '⭐', '♡'];
      for (let i = 0; i < count; i++) {
        const el = document.createElement('div');
        el.className = 'heart-particle';
        el.textContent = emojis[Math.floor(Math.random() * emojis.length)];
        el.style.left = (30 + Math.random() * 40) + '%';
        el.style.bottom = (20 + Math.random() * 30) + '%';
        el.style.animationDelay = (Math.random() * 0.4) + 's';
        container.appendChild(el);
        setTimeout(() => el.remove(), 2000);
      }
    }

    // Click on canvas to spray hearts + trigger pat via postMessage to parent
    renderer.domElement.addEventListener('click', (e) => {
      const rect = renderer.domElement.getBoundingClientRect();
      const clickY = (e.clientY - rect.top) / rect.height;
      // Top 40% = head pat, bottom 60% = poke
      if (clickY < 0.45) {
        triggerPat();
      }
      spawnHearts(3);
    });

    /* ===================== LOOK AT TARGET ===================== */
    // We will use manual bone rotation for more natural "whole head" movement
    let targetX = 0;
    let targetY = 0;
    let currentX = 0;
    let currentY = 0;

    /* ===================== ANIMATION LOOP ===================== */
    // Smooth lerp helper
    function lerpAngle(current, target, speed, dt) {
      return current + (target - current) * Math.min(1.0, speed * dt);
    }

    // Tracked bone targets (set by activity logic, applied with lerp)
    let boneTargets = {
      neckY: 0, neckX: 0, neckZ: 0,
      headY: 0, headX: 0, headZ: 0,
      spineY: 0, spineX: 0, spineZ: 0,
      rUAz: 1.3, rUAx: 0, lUAz: -1.3, lUAx: 0,
      rLAx: -0.3, rLAy: 0, lLAx: 0.3, lLAy: 0,
    };

    // Natural blink system
    let nextBlinkTime = 2 + Math.random() * 4;
    let blinkPhase = 0; // 0=open, >0=blinking
    let blinkDuration = 0.15;

    // Smooth expression targets
    let exprTargets = { joy: 0, angry: 0, sorrow: 0, fun: 0, aa: 0, blink: 0 };

    function animate() {
      requestAnimationFrame(animate);
      const delta = clock.getDelta();
      
      if (vrm) {
        const t = clock.elapsedTime;
        const lerpSpeed = 6.0; // Higher = snappier, lower = smoother (6 is buttery)

        // --- Determine head tracking influence ---
        const isSpecialAnim = ['pat', 'wave', 'dance'].includes(currentActivity);
        
        // Smoothly interpolate cursor tracking (only when not in special anim)
        if (!isSpecialAnim) {
          const damping = 4.0 * delta;
          currentX += (targetX - currentX) * damping;
          currentY += (targetY - currentY) * damping;
        } else {
          // Smoothly return tracking to center during special anims
          currentX += (0 - currentX) * 2.0 * delta;
          currentY += (0 - currentY) * 2.0 * delta;
        }

        // --- Compute idle micro-sway (always) ---
        const idleShakeX = Math.sin(t * 0.45) * 0.04 + Math.cos(t * 0.23) * 0.015;
        const idleShakeY = Math.cos(t * 0.31) * 0.025 + Math.sin(t * 0.17) * 0.015;

        // --- Activity-based target pose ---
        if (currentActivity === 'typing') {
          boneTargets.rUAz = -1.1; boneTargets.rUAx = -0.4;
          boneTargets.lUAz = 1.1;  boneTargets.lUAx = -0.4;
          const twR = Math.sin(t * 25) * 0.05 + Math.sin(t * 13) * 0.03;
          const twL = Math.cos(t * 22) * 0.05 + Math.cos(t * 11) * 0.03;
          boneTargets.rLAx = -0.8 + twR; boneTargets.rLAy = 0.2;
          boneTargets.lLAx = -0.8 + twL; boneTargets.lLAy = -0.2;
          // Head tracks but with typing micro-nods
          boneTargets.neckY = (currentX * 0.4) + idleShakeX;
          boneTargets.neckX = (currentY * 0.3) + idleShakeY + Math.sin(t * 2) * 0.02;
          boneTargets.headY = (currentX * 0.2);
          boneTargets.headX = (currentY * 0.2);
          boneTargets.spineX = Math.sin(t * 1.5) * 0.04;
          boneTargets.spineY = 0; boneTargets.spineZ = 0;

        } else if (currentActivity === 'pat') {
          // Happy bounce with head tilt
          boneTargets.neckZ = Math.sin(t * 4) * 0.12;
          boneTargets.neckY = Math.sin(t * 3) * 0.06;
          boneTargets.neckX = 0;
          boneTargets.headX = -0.12 + Math.sin(t * 6) * 0.06;
          boneTargets.headY = Math.sin(t * 5) * 0.05;
          boneTargets.headZ = Math.sin(t * 3.5) * 0.05;
          boneTargets.spineY = Math.sin(t * 8) * 0.05;
          boneTargets.spineX = Math.sin(t * 4) * 0.03;
          boneTargets.spineZ = Math.sin(t * 3) * 0.02;
          // Arms relax and sway happily
          const patSway = Math.sin(t * 3) * 0.12;
          boneTargets.rUAz = 1.1 + patSway; boneTargets.rUAx = Math.sin(t * 2) * 0.08;
          boneTargets.lUAz = -1.1 - patSway; boneTargets.lUAx = Math.sin(t * 2.5) * 0.08;
          boneTargets.rLAx = -0.15; boneTargets.rLAy = 0;
          boneTargets.lLAx = 0.15;  boneTargets.lLAy = 0;
          exprTargets.joy = 1.0;

        } else if (currentActivity === 'wave') {
          // Right arm up waving
          boneTargets.rUAz = 0.2; boneTargets.rUAx = -0.35;
          boneTargets.rLAx = -1.3 + Math.sin(t * 5) * 0.35; boneTargets.rLAy = 0.15;
          boneTargets.lUAz = -1.25; boneTargets.lUAx = 0;
          boneTargets.lLAx = 0.3; boneTargets.lLAy = 0;
          // Slight body lean + head tilt
          boneTargets.spineZ = -0.04;
          boneTargets.spineY = Math.sin(t * 1.5) * 0.03;
          boneTargets.spineX = Math.sin(t * 1) * 0.03;
          boneTargets.neckY = 0.08 + Math.sin(t * 2) * 0.04;
          boneTargets.neckX = -0.05;
          boneTargets.neckZ = Math.sin(t * 3) * 0.03;
          boneTargets.headY = 0.05;
          boneTargets.headX = -0.05 + Math.sin(t * 4) * 0.03;
          boneTargets.headZ = 0;
          exprTargets.joy = 0.7;

        } else if (currentActivity === 'dance') {
          // Full body dance with rhythm
          const dp = Math.sin(t * 3.5);
          const dp2 = Math.cos(t * 3.5);
          boneTargets.spineY = dp * 0.18;
          boneTargets.spineX = Math.sin(t * 1.8) * 0.07;
          boneTargets.spineZ = dp2 * 0.04;
          boneTargets.neckY = dp * 0.12;
          boneTargets.neckX = Math.sin(t * 2.5) * 0.04;
          boneTargets.neckZ = dp2 * 0.06;
          boneTargets.headY = dp * 0.06;
          boneTargets.headX = 0;
          boneTargets.headZ = dp2 * 0.04;
          // Energetic arm movement
          boneTargets.rUAz = 0.7 + dp * 0.5; boneTargets.rUAx = -0.25 + dp2 * 0.1;
          boneTargets.lUAz = -0.7 + dp2 * 0.5; boneTargets.lUAx = -0.25 + dp * 0.1;
          boneTargets.rLAx = -0.5 + dp2 * 0.25; boneTargets.rLAy = dp * 0.1;
          boneTargets.lLAx = -0.5 + dp * 0.25;  boneTargets.lLAy = dp2 * 0.1;
          exprTargets.fun = 1.0;
          exprTargets.joy = 0.5;

        } else {
          // === IDLE with FIDGETS ===
          const armSway = Math.sin(t * 0.8) * 0.06;
          const breathAmt = Math.sin(t * 1.2) * 0.04;

          // Default idle pose targets
          boneTargets.rUAz = 1.3 + armSway; boneTargets.rUAx = Math.sin(t * 0.5) * 0.04;
          boneTargets.lUAz = -1.3 - armSway; boneTargets.lUAx = Math.sin(t * 0.5) * 0.04;
          boneTargets.rLAx = -0.3; boneTargets.rLAy = 0;
          boneTargets.lLAx = 0.3;  boneTargets.lLAy = 0;

          // Head tracking with idle sway
          boneTargets.neckY = (currentX * 0.6) + idleShakeX;
          boneTargets.neckX = (currentY * 0.5) + idleShakeY;
          boneTargets.neckZ = 0;
          boneTargets.headY = (currentX * 0.3) + (idleShakeX * 0.5);
          boneTargets.headX = (currentY * 0.3) + (idleShakeY * 0.5);
          boneTargets.headZ = 0;
          boneTargets.spineY = (currentX * 0.1) + Math.sin(t * 0.5) * 0.03;
          boneTargets.spineX = (currentY * 0.1) + breathAmt;
          boneTargets.spineZ = 0;

          // Fidget system
          if (t - lastFidgetTime > fidgetInterval && fidgetType === -1) {
            fidgetType = Math.floor(Math.random() * 5); // 0-4
            currentFidgetPhase = 0;
            lastFidgetTime = t;
            fidgetInterval = 6 + Math.random() * 8;
          }

          if (fidgetType >= 0) {
            currentFidgetPhase += delta;
            const fp = currentFidgetPhase;

            if (fidgetType === 0 && fp < 2.5) {
              // Curious head tilt side-to-side
              boneTargets.neckZ = Math.sin(fp * 2.5) * 0.18;
              boneTargets.headZ = Math.sin(fp * 2.5) * 0.08;
            } else if (fidgetType === 1 && fp < 3.0) {
              // Stretch arms up slightly
              const stretch = Math.sin(fp * 1.2) * 0.25;
              boneTargets.rUAz = 1.3 + stretch;
              boneTargets.lUAz = -1.3 - stretch;
              boneTargets.rUAx = -0.12 * Math.sin(fp * 1.5);
              boneTargets.lUAx = -0.12 * Math.sin(fp * 1.5);
              boneTargets.spineX = breathAmt + Math.sin(fp * 1.0) * 0.06;
            } else if (fidgetType === 2 && fp < 2.0) {
              // Content long blink
              exprTargets.blink = Math.min(1.0, fp * 3);
              if (fp > 0.6) exprTargets.blink = Math.max(0, 1.0 - (fp - 0.6) * 2);
            } else if (fidgetType === 3 && fp < 2.5) {
              // Look to one side curiously
              boneTargets.headY = Math.sin(fp * 1.8) * 0.25;
              boneTargets.neckY = Math.sin(fp * 1.8) * 0.15;
              boneTargets.headX = -0.05;
            } else if (fidgetType === 4 && fp < 2.0) {
              // Happy little wiggle
              boneTargets.spineZ = Math.sin(fp * 5) * 0.04;
              boneTargets.neckZ = Math.sin(fp * 5) * 0.06;
            } else {
              fidgetType = -1;
            }
          }

          // Decay emotions during idle
          exprTargets.joy *= 0.97;
          exprTargets.fun *= 0.97;
        }

        // --- APPLY BONE ROTATIONS WITH SMOOTH LERP ---
        const neck = vrm.humanoid.getNormalizedBoneNode("neck");
        const head = vrm.humanoid.getNormalizedBoneNode("head");
        const spine = vrm.humanoid.getNormalizedBoneNode("spine");
        const rUA = vrm.humanoid.getNormalizedBoneNode("rightUpperArm");
        const lUA = vrm.humanoid.getNormalizedBoneNode("leftUpperArm");
        const rLA = vrm.humanoid.getNormalizedBoneNode("rightLowerArm");
        const lLA = vrm.humanoid.getNormalizedBoneNode("leftLowerArm");

        if (neck && !isSleeping) {
          neck.rotation.y = lerpAngle(neck.rotation.y, boneTargets.neckY, lerpSpeed, delta);
          neck.rotation.x = lerpAngle(neck.rotation.x, boneTargets.neckX, lerpSpeed, delta);
          neck.rotation.z = lerpAngle(neck.rotation.z, boneTargets.neckZ, lerpSpeed, delta);
        }
        if (head && !isSleeping) {
          head.rotation.y = lerpAngle(head.rotation.y, boneTargets.headY, lerpSpeed, delta);
          head.rotation.x = lerpAngle(head.rotation.x, boneTargets.headX, lerpSpeed, delta);
          head.rotation.z = lerpAngle(head.rotation.z, boneTargets.headZ, lerpSpeed, delta);
        }
        if (spine && !isSleeping) {
          spine.rotation.y = lerpAngle(spine.rotation.y, boneTargets.spineY, lerpSpeed, delta);
          spine.rotation.x = lerpAngle(spine.rotation.x, boneTargets.spineX, lerpSpeed, delta);
          spine.rotation.z = lerpAngle(spine.rotation.z, boneTargets.spineZ, lerpSpeed, delta);
        }
        if (rUA) {
          rUA.rotation.z = lerpAngle(rUA.rotation.z, boneTargets.rUAz, lerpSpeed, delta);
          rUA.rotation.x = lerpAngle(rUA.rotation.x, boneTargets.rUAx, lerpSpeed, delta);
        }
        if (lUA) {
          lUA.rotation.z = lerpAngle(lUA.rotation.z, boneTargets.lUAz, lerpSpeed, delta);
          lUA.rotation.x = lerpAngle(lUA.rotation.x, boneTargets.lUAx, lerpSpeed, delta);
        }
        if (rLA) {
          rLA.rotation.x = lerpAngle(rLA.rotation.x, boneTargets.rLAx, lerpSpeed, delta);
          rLA.rotation.y = lerpAngle(rLA.rotation.y, boneTargets.rLAy, lerpSpeed, delta);
        }
        if (lLA) {
          lLA.rotation.x = lerpAngle(lLA.rotation.x, boneTargets.lLAx, lerpSpeed, delta);
          lLA.rotation.y = lerpAngle(lLA.rotation.y, boneTargets.lLAy, lerpSpeed, delta);
        }

        // --- EXPRESSIONS (Smooth) ---
        if (isSleeping) {
          vrm.expressionManager.setValue("blink", 1.0);
          vrm.expressionManager.setValue("aa", 0);
        } else {
          // Natural blink with random intervals
          nextBlinkTime -= delta;
          if (nextBlinkTime <= 0 && blinkPhase <= 0 && fidgetType !== 2) {
            blinkPhase = blinkDuration;
            nextBlinkTime = 2.5 + Math.random() * 5; // 2.5-7.5s
            blinkDuration = 0.1 + Math.random() * 0.1; // vary blink speed
          }
          if (blinkPhase > 0) {
            blinkPhase -= delta;
            exprTargets.blink = blinkPhase > blinkDuration * 0.5 ? 1.0 : 0.0;
          } else if (fidgetType !== 2) {
            exprTargets.blink = 0;
          }

          // Smooth blink
          const curBlink = vrm.expressionManager.getValue("blink") || 0;
          vrm.expressionManager.setValue("blink", lerpAngle(curBlink, exprTargets.blink, 15, delta));

          // Smooth emotion expressions
          const curJoy = vrm.expressionManager.getValue("joy") || 0;
          const curFun = vrm.expressionManager.getValue("fun") || 0;
          vrm.expressionManager.setValue("joy", lerpAngle(curJoy, exprTargets.joy, 5, delta));
          vrm.expressionManager.setValue("fun", lerpAngle(curFun, exprTargets.fun, 5, delta));

          // Mouth mapping
          let mouthOpen = 0;
          if (isVoicevoxPlaying && analyser && dataArray) {
            analyser.getByteFrequencyData(dataArray);
            let sum = 0;
            for (let i = 0; i < dataArray.length; i++) sum += dataArray[i];
            const average = sum / dataArray.length;
            mouthOpen = Math.min(1.0, average / 40);
          } else if (window.speechSynthesis.speaking) {
            const wave1 = Math.abs(Math.sin(t * 12)) * 0.45;
            const wave2 = Math.abs(Math.sin(t * 7.3)) * 0.25;
            const wave3 = Math.abs(Math.sin(t * 3.1)) * 0.15;
            mouthOpen = Math.min(0.8, wave1 + wave2 + wave3);
          }
          
          const curMouth = vrm.expressionManager.getValue("aa") || 0;
          vrm.expressionManager.setValue("aa", lerpAngle(curMouth, mouthOpen, 12, delta));
        }

        vrm.update(delta);
      }
      renderer.render(scene, camera);
    }

    animate();

    window.addEventListener("resize", () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
    setTimeout(hideLoading, 8000);
  </script>
</body>
